<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Asya Gold</title>
    <link rel="icon" type="image/png" href="images/logo/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--cream);">

    <header class="scrolled" style="top: 0 !important; background: var(--white); border-bottom: 1px solid var(--border);">
        <div class="container nav-wrapper" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="font-family: var(--font-serif); font-size: 24px; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: #000; font-weight: 400;">Admin Panel</a>
            <nav class="nav-links" style="display: flex; gap: 30px;">
                <a href="index.html" style="text-decoration: none; color: #000; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Zur Website</a>
                <a href="shop.html" style="text-decoration: none; color: #000; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Shop-Ansicht</a>
            </nav>
        </div>
    </header>

    <main style="padding-top: 100px;">
        <div class="container">
            <!-- Top Row: Settings & Forms -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px;">
                
                <!-- Form: Produkt hinzufügen / bearbeiten -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" id="form-title" style="font-size: 20px; margin-bottom: 30px;">Produkt verwalten</h3>
                    <form id="add-product-form">
                        <input type="hidden" id="edit-id">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Produktname</label>
                                <input type="text" id="title" required style="width: 100%; padding: 10px; border: 1px solid var(--border);">
                            </div>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Kategorie</label>
                                <select id="category" style="width: 100%; padding: 10px; border: 1px solid var(--border);">
                                    <option>Signature Kollektion</option>
                                    <option>Halsketten</option>
                                    <option>Armbänder</option>
                                    <option>Ohrringe</option>
                                    <option>Ringe</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Preis (€)</label>
                                <input type="number" id="price" step="0.01" required style="width: 100%; padding: 10px; border: 1px solid var(--border);">
                            </div>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Lagerbestand</label>
                                <input type="number" id="stock" required style="width: 100%; padding: 10px; border: 1px solid var(--border);">
                            </div>
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Bild Upload</label>
                            <input type="file" id="image-file" accept="image/*" style="width: 100%; font-size: 11px;">
                            <input type="text" id="image-url" placeholder="Oder Bild-URL..." style="width: 100%; padding: 10px; border: 1px solid var(--border); margin-top: 10px;">
                        </div>

                        <button type="submit" id="submit-btn" class="cta-luxury" style="width: 100%; padding: 15px;">Speichern</button>
                        <button type="button" id="cancel-btn" style="width: 100%; margin-top: 10px; background: none; border: none; font-size: 10px; cursor: pointer; color: var(--gray); display: none;" onclick="resetForm()">Abbrechen</button>
                    </form>
                </div>

                <!-- Home Page & Global Settings -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" style="font-size: 20px; margin-bottom: 25px;">Website Gestaltung</h3>
                    
                    <div style="margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <label style="font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Ankündigungsleiste (Marquee)</label>
                            <label style="display: flex; align-items: center; gap: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;">
                                <input type="checkbox" id="marquee-active"> Aktiv
                            </label>
                        </div>
                        <textarea id="marquee-input" rows="2" style="width: 100%; padding: 10px; border: 1px solid var(--border); font-family: var(--font-sans); font-size: 12px;" placeholder="Text für die Laufleiste..."></textarea>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700;">Home Page Hero (Haupt-Überschrift)</label>
                        <textarea id="hero-title-input" rows="2" style="width: 100%; padding: 10px; border: 1px solid var(--border); font-family: var(--font-sans); font-size: 14px;" placeholder="z.B. Meisterstücke aus Gold."></textarea>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700;">Home Page Untertitel</label>
                        <input type="text" id="hero-subtitle-input" style="width: 100%; padding: 10px; border: 1px solid var(--border); font-family: var(--font-sans); font-size: 12px;" placeholder="z.B. Est. 1999 — Fine Jewelry">
                    </div>

                    <button onclick="updateSettings()" id="save-settings-btn" class="cta-luxury" style="width: 100%; padding: 15px;">Änderungen speichern</button>
                </div>
            </div>

            <!-- Bottom Row: Inventory (Full Width) -->
            <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h3 class="luxury-text" style="font-size: 24px; margin: 0;">Inventar verwalten</h3>
                    <span style="font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px;" id="product-count">0 Produkte</span>
                </div>
                <div id="admin-product-list">
                    <!-- Produkte via JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://asya-gold.f-klavun.workers.dev/api';
        let products = [];

        function formatCurrency(val) {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(val);
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                products = await res.json();
                renderAdminList();
            } catch (err) {
                console.error("Laden fehlgeschlagen:", err);
            }
        }

        function renderAdminList() {
            const list = document.getElementById('admin-product-list');
            document.getElementById('product-count').innerText = `${products.length} Produkte`;
            
            if (products.length === 0) {
                list.innerHTML = `<p style="text-align: center; color: var(--gray); padding: 40px 0;">Keine Produkte in der Datenbank.</p>`;
                return;
            }

            list.innerHTML = `
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gray);">
                            <th style="padding: 15px 0;">Bild</th>
                            <th style="padding: 15px;">Produkt / Kategorie</th>
                            <th style="padding: 15px;">Preis</th>
                            <th style="padding: 15px;">Bestand</th>
                            <th style="padding: 15px;">Status</th>
                            <th style="padding: 15px; text-align: right;">Aktionen</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map((p, index) => `
                            <tr style="border-bottom: 1px solid #f5f5f5; transition: background 0.3s;">
                                <td style="padding: 15px 0;">
                                    <img src="${p.image_url}" onerror="this.src='https://via.placeholder.com/50x60?text=Error'" style="width: 50px; height: 60px; object-fit: cover; background: #eee; border: 1px solid #eee;">
                                </td>
                                <td style="padding: 15px;">
                                    <h4 style="font-family: var(--font-serif); font-size: 16px; margin: 0;">${p.title}</h4>
                                    <span style="font-size: 10px; color: var(--gray); text-transform: uppercase;">${p.category}</span>
                                </td>
                                <td style="padding: 15px; font-weight: 600;">${formatCurrency(p.price)}</td>
                                <td style="padding: 15px;">
                                    <span style="display: inline-block; padding: 4px 8px; font-size: 11px; font-weight: 700; background: ${p.stock <= 3 ? '#ffebee' : '#f5f5f5'}; color: ${p.stock <= 3 ? '#c62828' : 'var(--black)'};">
                                        ${p.stock} Stk.
                                    </span>
                                </td>
                                <td style="padding: 15px;">
                                    <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: ${p.active ? '#2e7d32' : '#c62828'}">
                                        ${p.active ? '● Aktiv' : '○ Inaktiv'}
                                    </span>
                                </td>
                                <td style="padding: 15px; text-align: right;">
                                    <div style="display: flex; gap: 8px; justify-content: flex-end;">
                                        <button onclick="editProduct(${index})" style="background: #000; color: #fff; border: none; padding: 10px; width: 110px; font-size: 10px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; font-weight: 600; text-align: center;">Bearbeiten</button>
                                        <button onclick="toggleActive(${p.id}, ${p.active})" style="background: #f0f0f0; border: 1px solid #ddd; padding: 10px; width: 110px; font-size: 10px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; text-align: center;">${p.active ? 'Deaktivieren' : 'Aktivieren'}</button>
                                        <button onclick="deleteProduct(${p.id})" style="background: #fff; border: 1px solid #ffcdd2; color: #c62828; padding: 10px; width: 110px; font-size: 10px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; text-align: center;">Löschen</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Submit-Event ausgelöst.");
            
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Speichere...";
            submitBtn.disabled = true;

            const editId = document.getElementById('edit-id').value;
            let finalImageUrl = document.getElementById('image-url').value.trim();
            const imageFile = document.getElementById('image-file').files[0];

            console.log("Input Daten:", { editId, finalImageUrl, hasFile: !!imageFile });

            // 1. Wenn ein File ausgewählt wurde, zu R2 hochladen
            if (imageFile) {
                console.log("Starte Bild-Upload...");
                const formData = new FormData();
                formData.append('file', imageFile);
                try {
                    const uploadRes = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    if (!uploadRes.ok) throw new Error("Upload fehlgeschlagen");
                    const uploadData = await uploadRes.json();
                    finalImageUrl = uploadData.url;
                    console.log("Upload erfolgreich:", finalImageUrl);
                } catch (err) {
                    console.error("Upload-Fehler:", err);
                    alert("Upload fehlgeschlagen: " + err.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalText;
                    return;
                }
            }

            // 2. Produktdaten an Worker senden
            const productData = {
                id: editId ? parseInt(editId) : null,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                stock: parseInt(document.getElementById('stock').value),
                image: finalImageUrl || 'images/gold1.png',
                active: true
            };

            console.log("Sende Produkt-Daten:", productData);

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error("Server-Fehler: " + errorText);
                }
                
                const resData = await response.json();
                console.log("Server-Antwort:", resData);

                alert("Erfolgreich gespeichert!");
                resetForm();
                fetchProducts();
            } catch (err) {
                console.error("Speicher-Fehler:", err);
                alert("Speichern fehlgeschlagen: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        });

        window.editProduct = (index) => {
            const p = products[index];
            document.getElementById('edit-id').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('stock').value = p.stock || 0;
            document.getElementById('image-url').value = p.image_url;
            
            document.getElementById('form-title').innerText = 'Produkt bearbeiten';
            document.getElementById('submit-btn').innerText = 'Änderungen speichern';
            document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = async (id) => {
            if (confirm('Wirklich löschen?')) {
                await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                fetchProducts();
            }
        };

        window.toggleActive = async (id, currentStatus) => {
            const p = products.find(p => p.id === id);
            const updated = { ...p, id: id, active: !currentStatus, image: p.image_url };
            await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updated)
            });
            fetchProducts();
        };

        window.resetForm = () => {
            document.getElementById('add-product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = 'Produkt hinzufügen';
            document.getElementById('submit-btn').innerText = 'Produkt speichern';
            document.getElementById('cancel-btn').style.display = 'none';
        };

        // --- Marquee Settings ---
        async function fetchSettings() {
            try {
                const res = await fetch(`${API_URL}/settings`);
                const settings = await res.json();
                if (settings.marquee_text) {
                    document.getElementById('marquee-input').value = settings.marquee_text;
                }
                if (settings.marquee_active) {
                    document.getElementById('marquee-active').checked = settings.marquee_active === 'true';
                }
                if (settings.hero_title) {
                    document.getElementById('hero-title-input').value = settings.hero_title;
                }
                if (settings.hero_subtitle) {
                    document.getElementById('hero-subtitle-input').value = settings.hero_subtitle;
                }
            } catch (err) {
                console.error("Einstellungen konnten nicht geladen werden:", err);
            }
        }

        window.updateSettings = async () => {
            const btn = document.getElementById('save-settings-btn');
            const originalText = btn.innerText;
            btn.innerText = "Speichere...";
            btn.disabled = true;

            const marqueeText = document.getElementById('marquee-input').value;
            const marqueeActive = document.getElementById('marquee-active').checked ? 'true' : 'false';
            const heroTitle = document.getElementById('hero-title-input').value;
            const heroSubtitle = document.getElementById('hero-subtitle-input').value;
            
            try {
                const response = await fetch(`${API_URL}/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        marquee_text: marqueeText,
                        marquee_active: marqueeActive,
                        hero_title: heroTitle,
                        hero_subtitle: heroSubtitle
                    })
                });
                
                if (response.ok) {
                    alert("Einstellungen erfolgreich aktualisiert!");
                } else {
                    throw new Error("Update fehlgeschlagen");
                }
            } catch (err) {
                alert("Fehler: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        };

        fetchProducts();
        fetchSettings();

        // Reveal body after load (Transition Fix)
        function revealBody() {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 100);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', revealBody);
        } else {
            revealBody();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Asya Gold</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--cream);">

    <header class="scrolled">
        <div class="container nav-wrapper">
            <a href="index.html" class="logo">Admin Panel</a>
            <nav class="nav-links">
                <a href="index.html">Zur Website</a>
                <a href="shop.html">Shop-Ansicht</a>
            </nav>
        </div>
    </header>

    <main style="padding-top: 120px;">
        <div class="container">
            <div class="admin-grid" style="display: grid; grid-template-columns: 400px 1fr; gap: 50px;">
                
                <!-- Form: Produkt hinzufügen / bearbeiten -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" id="form-title" style="font-size: 24px; margin-bottom: 30px;">Produkt hinzufügen</h3>
                    <form id="add-product-form">
                        <input type="hidden" id="edit-id">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Produktname</label>
                            <input type="text" id="title" required style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Kategorie</label>
                            <select id="category" style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                                <option>Signature Collection</option>
                                <option>Fine Necklaces</option>
                                <option>Timeless Wristwear</option>
                                <option>Earrings</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Preis (nur Ziffern)</label>
                            <input type="number" id="price" step="0.01" required placeholder="z.B. 1290" style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                        </div>

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Lagerbestand</label>
                            <input type="number" id="stock" required value="10" style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Produktbild Hochladen (R2)</label>
                            <input type="file" id="image-file" accept="image/*" style="width: 100%; padding: 10px; border: 1px dashed var(--gold); background: #fffcf5;">
                            <p style="font-size: 10px; color: var(--gray); margin-top: 5px;">Oder Bild-URL direkt eingeben:</p>
                            <input type="text" id="image-url" placeholder="https://..." style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans); margin-top: 5px;">
                        </div>

                        <button type="submit" id="submit-btn" class="cta-luxury" style="width: 100%;">Produkt speichern</button>
                        <button type="button" id="cancel-btn" style="width: 100%; margin-top: 10px; background: none; border: none; font-size: 11px; cursor: pointer; color: var(--gray); display: none;" onclick="resetForm()">Abbrechen</button>
                    </form>
                </div>

                <!-- Marquee Settings -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" style="font-size: 24px; margin-bottom: 30px;">Ankündigungsleiste (Marquee)</h3>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Text der Laufleiste</label>
                        <textarea id="marquee-input" rows="3" style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans); resize: vertical;"></textarea>
                    </div>
                    <button onclick="updateSettings()" id="save-settings-btn" class="cta-luxury" style="width: 100%;">Text aktualisieren</button>
                    <p style="font-size: 10px; color: var(--gray); margin-top: 10px;">Tipp: Nutze • oder | als Trenner zwischen den Sätzen.</p>
                </div>

                <!-- Liste: Produkte verwalten -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" style="font-size: 24px; margin-bottom: 30px;">Inventar verwalten</h3>
                    <div id="admin-product-list">
                        <!-- Produkte via JS -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://asya-gold.f-klavun.workers.dev/api';
        let products = [];

        function formatCurrency(val) {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(val);
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                products = await res.json();
                renderAdminList();
            } catch (err) {
                console.error("Laden fehlgeschlagen:", err);
            }
        }

        function renderAdminList() {
            const list = document.getElementById('admin-product-list');
            if (products.length === 0) {
                list.innerHTML = `<p style="text-align: center; color: var(--gray); padding: 40px 0;">Keine Produkte in der Datenbank.</p>`;
                return;
            }

            list.innerHTML = products.map((p, index) => `
                <div style="display: flex; align-items: center; gap: 20px; padding: 15px 0; border-bottom: 1px solid var(--border);">
                    <img src="${p.image_url}" onerror="this.src='https://via.placeholder.com/50x60?text=Error'" style="width: 50px; height: 60px; object-fit: cover; background: #eee;">
                    <div style="flex: 1;">
                        <h4 style="font-family: var(--font-serif); font-size: 18px;">${p.title}</h4>
                        <p style="font-size: 11px; color: var(--gray); text-transform: uppercase;">${p.category} | ${formatCurrency(p.price)}</p>
                    </div>
                    <div style="text-align: right; margin-right: 20px;">
                        <span style="display: block; font-size: 10px; color: var(--gray); text-transform: uppercase;">Bestand</span>
                        <span style="font-weight: 700; color: ${p.stock <= 3 ? '#c62828' : 'var(--black)'}">${p.stock}</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="editProduct(${index})" style="padding: 5px 10px; font-size: 10px; cursor: pointer; background: #eee; border: none;">Bearbeiten</button>
                        <button onclick="toggleActive(${p.id}, ${p.active})" style="padding: 5px 10px; font-size: 10px; cursor: pointer; background: ${p.active ? '#e1f5fe' : '#ffebee'}; border: none; color: ${p.active ? '#0288d1' : '#c62828'};">
                            ${p.active ? 'Aktiv' : 'Inaktiv'}
                        </button>
                        <button onclick="deleteProduct(${p.id})" style="padding: 5px 10px; font-size: 10px; cursor: pointer; background: #fff; border: 1px solid #eee; color: #999;">Löschen</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Submit-Event ausgelöst.");
            
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Speichere...";
            submitBtn.disabled = true;

            const editId = document.getElementById('edit-id').value;
            let finalImageUrl = document.getElementById('image-url').value.trim();
            const imageFile = document.getElementById('image-file').files[0];

            console.log("Input Daten:", { editId, finalImageUrl, hasFile: !!imageFile });

            // 1. Wenn ein File ausgewählt wurde, zu R2 hochladen
            if (imageFile) {
                console.log("Starte Bild-Upload...");
                const formData = new FormData();
                formData.append('file', imageFile);
                try {
                    const uploadRes = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    if (!uploadRes.ok) throw new Error("Upload fehlgeschlagen");
                    const uploadData = await uploadRes.json();
                    finalImageUrl = uploadData.url;
                    console.log("Upload erfolgreich:", finalImageUrl);
                } catch (err) {
                    console.error("Upload-Fehler:", err);
                    alert("Upload fehlgeschlagen: " + err.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalText;
                    return;
                }
            }

            // 2. Produktdaten an Worker senden
            const productData = {
                id: editId ? parseInt(editId) : null,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                stock: parseInt(document.getElementById('stock').value),
                image: finalImageUrl || 'images/gold1.png',
                active: true
            };

            console.log("Sende Produkt-Daten:", productData);

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error("Server-Fehler: " + errorText);
                }
                
                const resData = await response.json();
                console.log("Server-Antwort:", resData);

                alert("Erfolgreich gespeichert!");
                resetForm();
                fetchProducts();
            } catch (err) {
                console.error("Speicher-Fehler:", err);
                alert("Speichern fehlgeschlagen: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        });

        window.editProduct = (index) => {
            const p = products[index];
            document.getElementById('edit-id').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('stock').value = p.stock || 0;
            document.getElementById('image-url').value = p.image_url;
            
            document.getElementById('form-title').innerText = 'Produkt bearbeiten';
            document.getElementById('submit-btn').innerText = 'Änderungen speichern';
            document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = async (id) => {
            if (confirm('Wirklich löschen?')) {
                await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                fetchProducts();
            }
        };

        window.toggleActive = async (id, currentStatus) => {
            const p = products.find(p => p.id === id);
            const updated = { ...p, id: id, active: !currentStatus, image: p.image_url };
            await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updated)
            });
            fetchProducts();
        };

        window.resetForm = () => {
            document.getElementById('add-product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = 'Produkt hinzufügen';
            document.getElementById('submit-btn').innerText = 'Produkt speichern';
            document.getElementById('cancel-btn').style.display = 'none';
        };

        // --- Marquee Settings ---
        async function fetchSettings() {
            try {
                const res = await fetch(`${API_URL}/settings`);
                const settings = await res.json();
                if (settings.marquee_text) {
                    document.getElementById('marquee-input').value = settings.marquee_text;
                }
            } catch (err) {
                console.error("Einstellungen konnten nicht geladen werden:", err);
            }
        }

        window.updateSettings = async () => {
            const btn = document.getElementById('save-settings-btn');
            const originalText = btn.innerText;
            btn.innerText = "Speichere...";
            btn.disabled = true;

            const marqueeText = document.getElementById('marquee-input').value;
            
            try {
                const response = await fetch(`${API_URL}/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ marquee_text: marqueeText })
                });
                
                if (response.ok) {
                    alert("Einstellungen erfolgreich aktualisiert!");
                } else {
                    throw new Error("Update fehlgeschlagen");
                }
            } catch (err) {
                alert("Fehler: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        };

        fetchProducts();
        fetchSettings();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | ASYA GOLD — Produktmanagement</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--light-gray);">

    <header class="scrolled">
        <div class="container nav-wrapper">
            <a href="index.html" class="logo">Asya Gold Admin</a>
            <nav class="nav-links">
                <a href="index.html">Zur Seite</a>
                <a href="#" onclick="logout()">Logout</a>
            </nav>
        </div>
    </header>

    <main style="padding-top: 150px;">
        <div class="container">
            <div class="admin-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 50px;">
                
                <!-- Form: Produkt hinzufügen / bearbeiten -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" id="form-title" style="font-size: 24px; margin-bottom: 30px;">Produkt hinzufügen</h3>
                    <form id="add-product-form">
                        <input type="hidden" id="edit-id">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Produktname</label>
                            <input type="text" id="title" required style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Kategorie</label>
                            <select id="category" style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                                <option>Signature Collection</option>
                                <option>Fine Necklaces</option>
                                <option>Timeless Wristwear</option>
                                <option>Earrings</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Preis (nur Ziffern)</label>
                            <input type="number" id="price" step="0.01" required placeholder="z.B. 1290" style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Bild-URL</label>
                            <input type="text" id="image" placeholder="images/..." style="width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-sans);">
                        </div>
                        <button type="submit" id="submit-btn" class="cta-luxury" style="width: 100%;">Produkt speichern</button>
                        <button type="button" id="cancel-btn" style="width: 100%; margin-top: 10px; background: none; border: none; font-size: 11px; cursor: pointer; color: var(--gray); display: none;" onclick="resetForm()">Abbrechen</button>
                    </form>
                </div>

                <!-- Liste: Produkte verwalten -->
                <div class="admin-card" style="background: var(--white); padding: 40px; border: 1px solid var(--border);">
                    <h3 class="luxury-text" style="font-size: 24px; margin-bottom: 30px;">Inventar verwalten</h3>
                    <div id="admin-product-list">
                        <!-- Produkte via JS -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Admin-System synchronisiert mit dem Shop
        const defaultProducts = [
            { id: 1, title: "L'Aurore Ring", category: "Signature Collection", price: 2490, image: "images/gold_diamond_ring_luxury_1777729778737.png", active: true },
            { id: 2, title: "Étoile Collier", category: "Fine Necklaces", price: 1850, image: "images/gold_necklace_elegant_1777729798075.png", active: true },
            { id: 3, title: "Océan Bracelet", category: "Timeless Wristwear", price: 3200, image: "images/gold_bracelet_set_1777729811867.png", active: true },
            { id: 4, title: "Lumière Hoops", category: "Earrings", price: 950, image: "images/gold_earrings_minimalist_1777729825390.png", active: true }
        ];

        let products = JSON.parse(localStorage.getItem('asya_products')) || defaultProducts;

        function formatCurrency(val) {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(val);
        }

        function renderAdminList() {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = products.map((p, index) => `
                <div style="display: flex; align-items: center; gap: 20px; padding: 15px 0; border-bottom: 1px solid var(--border);">
                    <img src="${p.image}" style="width: 50px; height: 60px; object-fit: cover; background: #eee;">
                    <div style="flex: 1;">
                        <h4 style="font-family: var(--font-serif); font-size: 18px;">${p.title}</h4>
                        <p style="font-size: 11px; color: var(--gray); text-transform: uppercase;">${p.category} | ${formatCurrency(p.price)}</p>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="editProduct(${index})" style="padding: 5px 10px; font-size: 10px; cursor: pointer; background: #eee; border: none;">Bearbeiten</button>
                        <button onclick="toggleActive(${index})" style="padding: 5px 10px; font-size: 10px; cursor: pointer; background: ${p.active ? '#e1f5fe' : '#ffebee'}; border: none; color: ${p.active ? '#0288d1' : '#c62828'};">
                            ${p.active ? 'Aktiv' : 'Inaktiv'}
                        </button>
                        <button onclick="deleteProduct(${index})" style="padding: 5px 10px; font-size: 10px; cursor: pointer; background: #fff; border: 1px solid #eee; color: #999;">Löschen</button>
                    </div>
                </div>
            `).join('');
            
            localStorage.setItem('asya_products', JSON.stringify(products));
        }

        document.getElementById('add-product-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const productData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                image: document.getElementById('image').value || 'images/gold_diamond_ring_luxury_1777729778737.png',
                active: true
            };

            if (editId) {
                // Bearbeiten
                const index = products.findIndex(p => p.id == editId);
                products[index] = { ...products[index], ...productData };
            } else {
                // Neu hinzufügen
                productData.id = Date.now();
                products.push(productData);
            }

            resetForm();
            renderAdminList();
        });

        window.editProduct = (index) => {
            const p = products[index];
            document.getElementById('edit-id').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('image').value = p.image;
            
            document.getElementById('form-title').innerText = 'Produkt bearbeiten';
            document.getElementById('submit-btn').innerText = 'Änderungen speichern';
            document.getElementById('cancel-btn').style.display = 'block';
        };

        window.resetForm = () => {
            document.getElementById('add-product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = 'Produkt hinzufügen';
            document.getElementById('submit-btn').innerText = 'Produkt speichern';
            document.getElementById('cancel-btn').style.display = 'none';
        };

        window.toggleActive = (index) => {
            products[index].active = !products[index].active;
            renderAdminList();
        };

        window.deleteProduct = (index) => {
            if(confirm('Produkt wirklich löschen?')) {
                products.splice(index, 1);
                renderAdminList();
            }
        };

        renderAdminList();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | ASYA GOLD — Exklusive Kollektionen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>Warenkorb</h3>
            <button class="close-btn" id="close-cart"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Items via JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Gesamtsumme</span>
                <span id="cart-total-price">0,00 €</span>
            </div>
            <button class="cta-luxury" style="width: 100%; margin-top: 20px;" onclick="startCheckout()">Zur Kasse</button>
        </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobile-menu">
        <button class="close-btn" id="close-mobile-menu"><i class="fa-solid fa-xmark"></i></button>
        <nav class="mobile-nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="index.html#atelier">Über uns</a>
            <a href="#kontakt">Kontakt</a>
        </nav>
    </div>

    <!-- Navigation -->
    <header id="header" class="scrolled"> <!-- Immer scrolled auf Shop Seite für Sichtbarkeit -->
        <div class="container nav-wrapper">
            <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
            <a href="index.html" class="logo">Asya Gold</a>
            
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="shop.html" class="active">Shop</a>
                <a href="index.html#atelier">Über uns</a>
                <a href="#kontakt">Kontakt</a>
            </nav>

            <div class="nav-actions">
                <button class="cart-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main style="padding-top: 150px;">
        <section class="container">
            <div class="section-intro">
                <span>Alle Kostbarkeiten</span>
                <h2>Unsere Online-Boutique</h2>
                <div class="shop-filters" style="margin-top: 40px; display: flex; justify-content: center; gap: 30px;">
                    <a href="#" class="filter-link active">Alle</a>
                    <a href="#" class="filter-link">Ringe</a>
                    <a href="#" class="filter-link">Halsketten</a>
                    <a href="#" class="filter-link">Armbänder</a>
                    <a href="#" class="filter-link">Ohrringe</a>
                </div>
            </div>

            <div class="product-grid" id="product-container">
                <!-- Produkte werden via JS geladen -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <a href="#" class="footer-logo">ASYA GOLD</a>
            
            <div class="footer-nav">
                <a href="shop.html">Shop</a>
                <a href="index.html#atelier">Über uns</a>
                <a href="#">Impressum</a>
                <a href="#">Datenschutz</a>
                <a href="#">Kontakt</a>
            </div>

            <div class="footer-social">
                <a href="https://www.instagram.com/asyamodeasyagold/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
            
            <div class="footer-bottom">
                &copy; 2026 ASYA GOLD — FINE JEWELRY & ART. INNSBRUCK, AUSTRIA.
            </div>
        </div>
    </footer>

    <style>
        .filter-link {
            text-decoration: none;
            color: var(--gray);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
        }
        .filter-link:hover, .filter-link.active {
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
        }
        .nav-links a.active {
            color: var(--gold);
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
